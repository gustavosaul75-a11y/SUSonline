<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Usuário - SUSonline</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

<header>

  <h1>SUSonline</h1>

  <p>
    Solicitação de Consulta
  </p>

  <a href="meus-agendamentos.html">
    <button>
      Ver Meus Agendamentos
    </button>
  </a>

</header>

<div class="etapa ativa">

  <h3>Dados do Paciente</h3>

  <label>Nome</label>
  <input type="text" id="nome">

  <label>CPF</label>
  <input type="text" id="cpf">

  <label>Data de Nascimento</label>
  <input type="date" id="nascimento">

  <label>Telefone</label>
  <input type="tel" id="telefone">

  <label>Especialidade</label>

  <select id="especialidade">

    <option>Clínico Geral</option>

    <option>Cardiologia</option>

    <option>Pediatria</option>

    <option>Ortopedia</option>

  </select>

  <label>Unidade</label>

  <select id="unidade">

    <option>UBS São Francisco</option>

    <option>UBS Dra Maira Fachini</option>

    <option>UBS Louviral Pires</option>

  </select>

  <button onclick="salvarSolicitacao()">

    Solicitar Consulta

  </button>

  <a href="login.html">

    <button class="botao-voltar">

      ← Sair

    </button>

  </a>

</div>

<footer>

  <p>
    SUSonline © 2026 | Desenvolvido por Gustavo Martins
  </p>

</footer>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="firebase.js"></script>

</body>

</html>

</html>
